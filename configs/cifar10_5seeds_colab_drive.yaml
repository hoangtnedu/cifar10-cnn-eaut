experiment:
  name: cifar10_5seeds
  output_dir: /content/drive/MyDrive/cifar10_eaut_outputs
  data_dir: /content/cifar10_eaut_data
  resume: true
  save_best_by: val_acc
  print_every: 1

reproducibility:
  seeds: [42, 43, 44, 45, 46]
  deterministic: false
  benchmark: true

models:
  names:
    - SimpleCNN
    - VGG11TinyBN
    - ResNet18CIFAR
    - MobileNetV2CIFAR
    - EfficientNetB0CIFAR
  num_classes: 10

training:
  epochs: 100
  batch_size: 128
  num_workers: 2
  optimizer: SGD
  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0005
  scheduler: CosineAnnealingLR
  label_smoothing: 0.1
  amp: true
  val_ratio: 0.1

measurement:
  enabled: true
  input_size: [1, 3, 32, 32]
  latency_device: cpu
  latency_batch_size: 1
  latency_warmup: 30
  latency_iters: 100
  cpu_threads: 1
